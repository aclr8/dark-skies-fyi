name: Weekly data refresh

on:
  schedule:
    # Every Wednesday at 06:00 UTC (10 pm Tuesday Pacific / 11 pm during DST)
    # Vercel deploys automatically once the commit lands on main.
    - cron: "0 6 * * 3"

  # Also allow a manual run from the GitHub Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ephem requests

      - name: Generate park data
        run: python3 scripts/generate_data.py

      - name: Commit and push updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          # Only commit if something actually changed
          git diff --cached --quiet || \
            git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"
          git push
